<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScenePrompter - AI Video Artist OS</title>
    <!-- Fonts self-hosted (latin + latin-ext) so the app has no external
         dependency and works offline. -->
    <link rel="stylesheet" href="vendor/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0b0d">

    <!-- Three.js r128 + OrbitControls, vendored locally (no CDN). -->
    <script src="vendor/three.min.js"></script>
    <script src="vendor/OrbitControls.js"></script>
</head>
<body>
    <div class="top-bar">
        <!-- Brand: studio mark, product name, what it is. Part of the flex row,
             so it can never sit on top of the first nav button again. -->
        <a class="brand" href="https://www.drmnl.studio" target="_blank" title="DRMNL Studio">
            <img class="brand-mark" src="assets/logo.png" alt="DRMNL Studio">
        </a>
        <div class="brand-rule"></div>
        <div class="brand-text">
            <div class="brand-name">Scene<span>Prompter</span></div>
            <div class="brand-tag">AI Video Artist OS</div>
        </div>

        <nav class="top-nav" aria-label="Nodes and tools">
            <button class="nav-btn" data-cat="tool" onpointerdown="window.undo()" title="Undo (Ctrl+Z)">&#8630; Undo</button>
            <button class="nav-btn" data-cat="tool" onpointerdown="window.redo()" title="Redo (Ctrl+Y)">&#8631; Redo</button>
            <button class="nav-btn" data-cat="tool" id="sel-mode-btn" onpointerdown="window.toggleSelectMode()" title="Select mode (S)">&#9633; Select</button>
            <button class="nav-btn" data-cat="tool" onpointerdown="window.tidyLayout()" title="Arrange nodes into a column">&#8801; Tidy</button>
            <button class="nav-btn" data-cat="tool" onpointerdown="window.fitToView()" title="Fit all nodes in view">&#10530; Fit</button>
            <button class="nav-btn primary phone-hide" onpointerdown="window.openQuickAdd()" title="Quick add (Tab)">+ Add</button>
            <button class="nav-btn phone-hide" data-cat="tool" onpointerdown="window.randomizeAll()" title="Randomize the whole scene (R)">&#127922; Random</button>
            <span class="nav-sep"></span>

            <button class="nav-btn" data-cat="source" onpointerdown="createNode('scene')">Scene</button>
            <button class="nav-btn" data-cat="source" onpointerdown="createNode('customloc')">&#128205; Location</button>
            <button class="nav-btn" data-cat="source" onpointerdown="createNode('style')">Style</button>
            <button class="nav-btn" data-cat="source" onpointerdown="createNode('render')">Render</button>
            <span class="nav-sep"></span>

            <button class="nav-btn" data-cat="subject" onpointerdown="createNode('character')">Character</button>
            <!-- Subject buttons are generated from the SUBJECTS registry -->
            <span id="subject-nav" style="display:contents"></span>
            <button class="nav-btn" data-cat="subject" onpointerdown="createNode('object')">Object</button>
            <span class="nav-sep"></span>

            <button class="nav-btn" data-cat="light" onpointerdown="createNode('light')">Light</button>
            <button class="nav-btn" data-cat="light" onpointerdown="createNode('atmos')">Atmosphere</button>
            <span class="nav-sep"></span>

            <button class="nav-btn" data-cat="camera" onpointerdown="createNode('camera')">Camera</button>
            <button class="nav-btn" data-cat="camera" onpointerdown="createNode('shot')">Shot Type</button>
            <button class="nav-btn" data-cat="camera" onpointerdown="createNode('cammove')">Movement</button>
            <button class="nav-btn" data-cat="camera" onpointerdown="createNode('position')">Position</button>
            <span class="nav-sep"></span>

            <button class="nav-btn" data-cat="grade" onpointerdown="createNode('colorg')">Color Grade</button>
            <button class="nav-btn" data-cat="grade" onpointerdown="createNode('comp')">Composition</button>
            <button class="nav-btn" data-cat="grade" onpointerdown="createNode('material')">Material</button>
            <button class="nav-btn" data-cat="grade" onpointerdown="createNode('preview')">Preview</button>
            <span class="nav-sep"></span>

            <button class="nav-btn" data-cat="output" onpointerdown="createNode('stack')">Stack</button>
            <button class="nav-btn" data-cat="output" onpointerdown="createNode('sequence')">Sequence</button>
            <button class="nav-btn" data-cat="output" onpointerdown="createNode('neg')">Negative</button>
        </nav>

        <div class="overflow-wrap">
            <!-- Phone: this ⋯ is the only file control; it opens the popover below.
                 Desktop: hidden, the actions sit inline. -->
            <button class="nav-btn overflow-btn" data-cat="tool" onpointerdown="toggleOverflow(event)" title="More">&#8943;</button>
            <div class="file-actions" id="file-actions">
                <!-- Quick-load dropdown (desktop/tablet only); options from PRESETS in app.js -->
                <select id="preset_sel" onchange="loadPresetConfirmed(this.value)"
                    style="background:#111; color:#ccc; border:1px solid rgba(255,255,255,0.09); padding:0 8px;
                           border-radius:6px; font-weight:700; font-size:0.68rem; cursor:pointer; min-height:34px;">
                    <option value="">-- Presets --</option>
                </select>
                <button class="nav-btn" data-cat="tool" data-act="presets" onpointerdown="openPresetManager()" title="Save / manage presets"><span class="glyph">&#11088;</span>Presets</button>
                <button class="nav-btn" data-cat="tool" data-act="history" onpointerdown="openHistory()" title="History"><span class="glyph">&#128339;</span>History</button>
                <button class="nav-btn" data-cat="tool" data-act="save" onpointerdown="saveWorkspace()" title="Save"><span class="glyph">&#128190;</span>Save</button>
                <button class="nav-btn" data-cat="tool" data-act="load" onpointerdown="loadWorkspace()" title="Load"><span class="glyph">&#128193;</span>Load</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal-sheet" style="display:none; position:fixed; top:50px; left:50%; transform:translateX(-50%); width:600px; max-height:80vh; background:#1a1a1a; border:1px solid #444; border-radius:8px; z-index:3000; overflow-y:auto; padding:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
            <h3 style="margin:0; color:#eee;">Prompt History & Export</h3>
            <button onclick="document.getElementById('history-modal').style.display='none'" style="background:none; border:none; color:#fff; cursor:pointer; font-size:1.2rem;">&times;</button>
        </div>
        <div id="history-content" style="display:flex; flex-direction:column; gap:10px;"></div>
        <div style="margin-top:20px; text-align:right;">
            <button onclick="clearHistory()" style="background:#551111; color:#fff; border:1px solid #ff5555; padding:8px 16px; border-radius:4px; cursor:pointer; margin-right:10px;">Clear History</button>
            <button onclick="exportHistory()" style="background:#115511; color:#fff; border:1px solid #55ff55; padding:8px 16px; border-radius:4px; cursor:pointer;">Export as .txt</button>
        </div>
    </div>

    <!-- display is toggled by openQuickAdd(); it sets `flex`, so this stays `none`.
         Declaring display twice inline made the later `flex` win and the modal
         was open on every page load. -->
    <div id="quick-add-modal" class="modal-sheet" style="display:none; flex-direction:column; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90vw; max-width:500px; max-height:70vh; background:#1a1a1a; border:1px solid #444; border-radius:8px; z-index:3500; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
        <div class="sheet-grab"></div>
        <div style="padding:16px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; color:#eee; font-size:1rem;">+ Quick Add</h3>
            <button onclick="document.getElementById('quick-add-modal').style.display='none'" style="background:none; border:none; color:#fff; cursor:pointer; font-size:1.5rem; min-width:44px; min-height:44px;">&times;</button>
        </div>
        <input type="text" id="quick-add-search" placeholder="Search node type..." style="background:#111; color:#eee; border:1px solid #333; padding:10px; margin:10px; font-size:0.9rem; border-radius:4px;" oninput="window.filterQuickAdd(this.value)">
        <div id="quick-add-list" style="flex:1; overflow-y:auto; padding:10px; display:grid; grid-template-columns:repeat(auto-fill, minmax(80px, 1fr)); gap:8px;"></div>
    </div>

    <div id="minimap"><div id="mini-vp" class="mini-vp"></div></div>

    <!-- Phone-only thumb-zone bar. Hidden on desktop; the top bar covers those. -->
    <div class="action-bar" id="action-bar">
        <button class="pri" onpointerdown="window.openQuickAdd()"><span class="ic">＋</span>Add</button>
        <button onpointerdown="window.randomizeAll()"><span class="ic">🎲</span>Random</button>
        <button onpointerdown="window.focusPreview()"><span class="ic">👁</span>Preview</button>
        <button onpointerdown="window.generateNow()"><span class="ic">▸</span>Generate</button>
    </div>

    <div id="viewport">
        <div id="world">
            <div class="grid-layer"></div>
            <svg id="svg-layer"></svg>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/subjects.js"></script>
    <script src="js/materials.js"></script>
    <script src="js/promptEngine.js"></script>
    <script src="js/app.js"></script>
    <!-- PWA: register the service worker (only runs on https / localhost).
         addEventListener, not window.onload, so it doesn't clobber app.js. -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
